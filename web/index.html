<!DOCTYPE html>
<html lang="sv" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fyndkartan - butiker &amp; erbjudanden</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-header d-flex align-items-center px-3 gap-3">
    <button id="navToggle" class="nav-toggle" aria-label="Visa/dölj panel">&#9776;</button>
    <div class="brand">fynd<span>kartan</span></div>
    <div class="header-sub d-none d-md-block">Hitta butiker &amp; erbjudanden nära dig</div>
    <div class="ms-auto d-flex align-items-center gap-3">
      <button id="viewToggle" class="btn btn-sm btn-outline-light">Bläddra sortiment</button>
      <span id="authArea" class="d-flex align-items-center gap-2"></span>
    </div>
  </header>

  <!-- Inloggning/registrering -->
  <div id="authModal" class="auth-modal d-none">
    <div class="auth-card">
      <div class="d-flex align-items-center mb-2">
        <h6 id="authTitle" class="mb-0">Logga in</h6>
        <button id="authClose" class="btn-close ms-auto" aria-label="Stäng"></button>
      </div>
      <div class="small text-muted mb-2">Logga in eller skapa ett konto för att använda Fyndkartan.</div>
      <input id="authEmail" type="email" class="form-control form-control-sm mb-2" placeholder="E-post" autocomplete="email">
      <input id="authPass" type="password" class="form-control form-control-sm mb-2" placeholder="Lösenord (minst 8 tecken)" autocomplete="current-password">
      <div id="authError" class="text-danger small mb-2 d-none"></div>
      <button id="authSubmit" class="btn btn-dark btn-sm w-100 mb-2">Logga in</button>
      <div id="authToggleRow" class="small text-muted text-center">
        <span id="authToggleText">Inget konto?</span>
        <a href="#" id="authToggle">Registrera dig</a>
      </div>
    </div>
  </div>

  <!-- Kontoinställningar -->
  <div id="settingsModal" class="auth-modal d-none">
    <div class="auth-card">
      <div class="d-flex align-items-center mb-2">
        <h6 class="mb-0">Kontoinställningar</h6>
        <button id="setClose" class="btn-close ms-auto" aria-label="Stäng"></button>
      </div>
      <div class="small text-muted mb-3">Inloggad som <span id="setEmail" class="fw-semibold"></span></div>
      <div class="text-uppercase text-muted fw-semibold mb-2" style="font-size:.72rem">Byt lösenord</div>
      <input id="setCur" type="password" class="form-control form-control-sm mb-2" placeholder="Nuvarande lösenord" autocomplete="current-password">
      <input id="setNew" type="password" class="form-control form-control-sm mb-2" placeholder="Nytt lösenord (minst 8 tecken)" autocomplete="new-password">
      <div id="setMsg" class="small mb-2 d-none"></div>
      <button id="setSave" class="btn btn-dark btn-sm w-100">Spara lösenord</button>
    </div>
  </div>

  <!-- Produktinfo (ingredienser/näring per EAN) -->
  <div id="productModal" class="auth-modal d-none">
    <div class="auth-card" style="width:480px">
      <div class="d-flex align-items-center mb-2">
        <h6 id="productModalTitle" class="mb-0">Produktinfo</h6>
        <button id="productClose" class="btn-close ms-auto" aria-label="Stäng"></button>
      </div>
      <div id="productModalBody"></div>
    </div>
  </div>

  <div class="app-body">
    <aside class="sidebar">
      <div class="p-3 border-bottom">
        <input id="search" type="search" class="form-control form-control-sm"
               placeholder="Sök butik, ort eller adress&hellip;">
        <input id="productSearch" type="search" class="form-control form-control-sm mt-2"
               placeholder="Sök produkt (namn)&hellip;">
        <div class="form-check form-switch mt-2 small">
          <input class="form-check-input" type="checkbox" id="onlyOffers">
          <label class="form-check-label" for="onlyOffers">Bara butiker med erbjudanden</label>
        </div>
        <div class="form-check form-switch small fav-only">
          <input class="form-check-input" type="checkbox" id="onlyFavorites">
          <label class="form-check-label" for="onlyFavorites">&#9733; Bara favoriter</label>
        </div>
        <div class="d-flex gap-2 mt-2">
          <button id="compareBtn" class="btn btn-sm btn-dark flex-grow-1">Prisjämför här</button>
          <select id="compareRadius" class="form-select form-select-sm" style="width:auto">
            <option value="3">3 km</option>
            <option value="5" selected>5 km</option>
            <option value="10">10 km</option>
            <option value="20">20 km</option>
          </select>
        </div>
        <button id="favOffersBtn" class="btn btn-sm btn-outline-dark w-100 mt-2 fav-only">&#9733; Mina favoriters erbjudanden</button>
        <button id="compareFavBtn" class="btn btn-sm btn-outline-dark w-100 mt-2 fav-only">&#9733; Jämför mina favoriter</button>
      </div>

      <div class="p-3 border-bottom">
        <div class="text-uppercase text-muted small fw-semibold mb-2">Kedjor</div>
        <div id="chainFilters" class="d-flex flex-column gap-1"></div>
      </div>

      <div class="px-3 py-2 text-muted small flex-grow-1 overflow-auto">
        <div id="resultCount" class="fw-semibold mb-2"></div>
        <div id="storeList" class="store-list"></div>
      </div>

      <!-- Erbjudande-panel (visas när en butiks erbjudanden laddas) -->
      <div id="offersPanel" class="offers-panel d-none">
        <div class="offers-head">
          <button id="offersBack" class="btn btn-sm btn-link p-0">&larr; Tillbaka</button>
          <div id="offersTitle" class="offers-title"></div>
        </div>
        <div class="d-flex gap-2 mb-2">
          <input id="offersFilter" type="search" class="form-control form-control-sm"
                 placeholder="Filtrera&hellip;">
          <select id="offersSort" class="form-select form-select-sm" style="width:auto">
            <option value="default">Ordning</option>
            <option value="savings">Störst besparing</option>
            <option value="price">Lägst pris</option>
            <option value="name">A&ndash;Ö</option>
          </select>
        </div>
        <div class="d-flex gap-2 mb-2">
          <select id="offersCategory" class="form-select form-select-sm"></select>
          <select id="offersDeal" class="form-select form-select-sm" style="width:auto">
            <option value="">Alla typer</option>
            <option value="multibuy">Flerköp</option>
            <option value="by_weight">Per vikt</option>
            <option value="flat">Fast pris</option>
          </select>
        </div>
        <div id="offersList" class="offers-list"></div>
      </div>

      <!-- Jämförelse-panel (prisjämför i närheten) -->
      <div id="comparePanel" class="offers-panel d-none">
        <div class="offers-head">
          <button id="compareBack" class="btn btn-sm btn-link p-0">&larr; Tillbaka</button>
          <div id="compareTitle" class="offers-title"></div>
        </div>
        <div class="d-flex gap-2 mb-2">
          <input id="compareFilter" type="search" class="form-control form-control-sm"
                 placeholder="Filtrera produkter&hellip;">
          <select id="favSort" class="form-select form-select-sm" style="width:auto">
            <option value="default">Ordning</option>
            <option value="savings">Störst besparing</option>
            <option value="price">Lägst pris</option>
            <option value="name">A&ndash;Ö</option>
          </select>
        </div>
        <div class="d-flex gap-2 mb-2">
          <select id="compareCategory" class="form-select form-select-sm"></select>
          <select id="compareDeal" class="form-select form-select-sm" style="width:auto">
            <option value="">Alla typer</option>
            <option value="multibuy">Flerköp</option>
            <option value="by_weight">Per vikt</option>
            <option value="flat">Fast pris</option>
          </select>
        </div>
        <div id="compareList" class="offers-list"></div>
      </div>

      <!-- Produktsök-panel (namnsök + kategori-bläddring, ur erbjudande-cachen) -->
      <div id="productsPanel" class="offers-panel d-none">
        <div class="offers-head">
          <button id="productsBack" class="btn btn-sm btn-link p-0">&larr; Tillbaka</button>
          <div id="productsTitle" class="offers-title">Produkter</div>
        </div>
        <div class="btn-group btn-group-sm w-100 mb-2" role="group" aria-label="Sökläge">
          <button id="prodModeOffers" type="button" class="btn btn-outline-dark active">Erbjudanden</button>
          <button id="prodModeCatalog" type="button" class="btn btn-outline-dark">Hela sortimentet</button>
        </div>
        <div class="d-flex gap-2 mb-2">
          <input id="productsFilter" type="search" class="form-control form-control-sm"
                 placeholder="Sök produkt&hellip;">
          <select id="productsCategory" class="form-select form-select-sm" style="width:auto"></select>
        </div>
        <div id="productsList" class="offers-list"></div>
      </div>

      <div class="p-2 border-top text-muted xsmall">
        Kartdata &copy; OpenStreetMap-bidragsgivare
      </div>
    </aside>

    <main id="map"></main>
    <section id="browseView" class="d-none">
      <div class="browse-head">
        <input id="browseSearch" type="search" class="form-control form-control-sm" placeholder="Sök i hela sortimentet&hellip;">
        <select id="browseChain" class="form-select form-select-sm" style="width:auto"></select>
        <select id="browseSort" class="form-select form-select-sm" style="width:auto">
          <option value="">Ordning</option>
          <option value="price">Lägst pris</option>
          <option value="spread">Störst prisskillnad</option>
          <option value="savings">Störst besparing</option>
          <option value="name">A&ndash;Ö</option>
        </select>
        <select id="browseDeal" class="form-select form-select-sm" style="width:auto">
          <option value="">Alla erbjudanden</option>
          <option value="multibuy">Flerköp</option>
          <option value="by_weight">Per vikt</option>
          <option value="flat">Fast pris</option>
        </select>
        <label class="d-flex align-items-center gap-1 small text-nowrap" style="cursor:pointer">
          <input id="browseOffers" type="checkbox"> Bara erbjudanden
        </label>
        <label class="d-flex align-items-center gap-1 small text-nowrap fav-only" style="cursor:pointer">
          <input id="browseFav" type="checkbox"> &#9733; Rea hos favoriter
        </label>
      </div>
      <div id="browseCats" class="browse-cats"></div>
      <div id="browseSummary" class="browse-summary text-muted small"></div>
      <div id="browseTitle" class="browse-title"></div>
      <div id="browseGrid" class="browse-grid"></div>
      <div id="browseMore" class="text-center my-3"></div>
    </section>
    <div id="productFilterBar" class="d-none">
      <span id="productFilterText"></span>
      <button id="productFilterClear" type="button" aria-label="Rensa filter">&times;</button>
    </div>
    <div class="nav-backdrop" id="navBackdrop"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
